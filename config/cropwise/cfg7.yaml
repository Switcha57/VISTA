pipeline: cropwise_moondream

output:
  dir: ./out/cropwise_cfg7
  min_track_frames: 15
  merge_gap_frames: 30
  merge_dist_ratio: 0.5

device: cuda:0
seed: 42

detector:
  weights: out/rtdetr_vistacrash/weights/best.pt
  conf: 0.30
  tracker: config/trackers/bytetrack_long.yaml
  # SAHI sliced inference: tile the 1920x1080 frame so small persons grow
  # large enough for the detector to be confident about them.
  sahi:
    model_type: ultralytics
    slice_height: 640
    slice_width: 640
    overlap: 0.2
    sahi_conf: 0.05          # internal SAHI floor; tracker enforces real thresholds
    postprocess_iou: 0.5     # NMS across tile borders

moondream:
  model_id: vikhyatk/moondream2
  prompt: >
    Briefly describe the condition and action of the main subject in this image.
    Keep it very short, like a label (e.g., crashed car, injured person sitting, paramedic helping).
  max_new_tokens: 48

caption:
  stride: 30
  padding: 0.05
  recaption_every: 3
