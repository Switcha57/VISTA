pipeline: cropwise_moondream

output:
  dir: ./out/cropwise_cfg8
  min_track_frames: 15
  merge_gap_frames: 30
  merge_dist_ratio: 0.5

device: cuda:0
seed: 42

# Role-split ensemble:
#   * COCO YOLO12-x  -> persons only (well-calibrated person head, sees prone poses)
#   * Fine-tuned RT-DETR -> car / crashed car (only it knows the "crashed car" semantic)
# Both feeds are concatenated, per-class NMS-deduped, then fed to the same
# bytetrack_long tracker as the cfg6 baseline (single-variable experiment vs
# the finetuned-tracker-v1 tag).
detector:
  conf: null                                  # global gate (null = no extra filter)
  tracker: config/trackers/bytetrack_long.yaml
  ensemble:
    nms_iou: 0.5
    detectors:
      - weights: yolo12x.pt
        type: yolo
        classes: ["person"]
        conf: 0.30
        imgsz: 1920
      - weights: out/rtdetr_vistacrash/weights/best.pt
        type: rtdetr
        classes: ["crashed car", "car"]
        conf: 0.30
        imgsz: 1280

moondream:
  model_id: vikhyatk/moondream2
  prompt: >
    Briefly describe the condition and action of the main subject in this image.
    Keep it very short, like a label (e.g., crashed car, injured person sitting, paramedic helping).
  max_new_tokens: 48

caption:
  stride: 30
  padding: 0.05
  recaption_every: 3
