tracker_type: bytetrack
track_high_thresh: 0.45    # min conf to start a new high-conf track
track_low_thresh: 0.10     # min conf for low-conf association pass
new_track_thresh: 0.50     # min conf to init a brand-new track ID
track_buffer: 90           # frames a lost track is kept alive before deletion (3s @ 30fps)
match_thresh: 0.80         # IoU threshold for track-detection matching
fuse_score: true
